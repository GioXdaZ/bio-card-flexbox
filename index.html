<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Bio Card</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 🎨 ESCRIBE AQUÍ TU CSS CON FLEXBOX */

        .escenario {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 5px;
            border-radius: 15px;
            max-width: 350px;
            min-height: 150px;
            background: linear-gradient(75deg, rgb(70, 0, 128), rgb(5, 4, 66));
            box-shadow: 0 0 15px #2a56c5;
            color: #fff;
        }

        .avatar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 25px;

        }

        .avatar img {
            max-width: 25%;
            border-radius: 50%;
            object-fit: cover;
        }

        .stats {
            display: flex;
            justify-content: space-evenly;
            gap: 15px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-radius: 15px;
            background: #233a72;
        }

        .destacado {
            background: #2a56c5;
        }

        .social {
            display: flex;
            justify-content: center;
            text-align: center;
            gap: 15px;
            flex-wrap: nowrap;

        }

        .social a {
            padding: 10px;
            border-radius: 50%;
            background-color: #580886;
        }

        .social a img {
            width: 28px;
            height: 28px;
            display: block;
        }

        a:hover {
            transition: all 0.2s ease;
            transform: scale(110%);
            box-shadow: 0px 4px 15px violet;
        }

        .foot {
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div class="escenario">
        <main class="card">
            <div class="avatar">
                <img src="CROWS.png" alt="avatar">
            </div>
            <h1 class="name">Giovanni Dazarola</h1>
            <p class="bio">Programador Front-End Trainee.</p>
            <section class="stats">
                <div class="stat"><b>1.2k</b><span>Seguidores</span></div>
                <div class="stat"><b>34</b><span>Proyectos</span></div>
                <div class="stat"><b>8.9k</b><span>Likes</span></div>
            </section>
            <nav class="links">
                <a href="https://pokedex-hoenn-version.netlify.app/" class="link destacado">🌟 Mi proyecto estrella</a>
                <a href="https://github.com/GioXdaZ/Pokedex-Hoenn-Version-React" class="link">📝 GitHub proyecto estrella</a>
                <a href="https://github.com/GioXdaZ" class="link">💼 GitHub</a>
                <a href="https://www.youtube.com/@Crows616" class="link">📺 YouTube</a>
            </nav>
            <div class="social">
                <a href="#">
                    <img src="icons/black-instagram-transparent-logo-10671.svg" alt="IG">
                </a>
                <a href="#">
                    <img src="icons/twitter-logo-black-outline-20846.svg" alt="X">
                </a>
                <a href="#">
                    <img src="icons/black-linkedin-logo-15915.svg" alt="in">
                </a>
                <a href="https://github.com/GioXdaZ">
                    <img src="icons/github-logo-6532.svg" alt="GH">
                </a>
            </div>
            <footer class="foot">Hecho con 💙 y Flexbox by <strong>GioXdaZ</strong></footer>
        </main>
    </div>
</body>

</html>
